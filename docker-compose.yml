services:
  database:
    image: mongo:6.0
    container_name: codesync-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: codesync-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://database:27017/codesync
      - CORS_ORIGIN=http://localhost:5173
    depends_on:
      - database

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: codesync-web
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  mongo-data:
